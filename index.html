<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ENTREGADOR PRO v2</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root { --primary: #2c3e50; --success: #2ecc71; --danger: #e74c3c; --warning: #f1c40f; --bg: #f8f9fa; --accent: #3498db; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; margin: 0; background: var(--bg); color: #333; user-select: none; }
        .header { background: var(--primary); color: white; padding: 50px 20px 20px; text-align: center; font-weight: bold; letter-spacing: 2px; position: sticky; top: 0; z-index: 10; }
        .content { padding: 20px; padding-bottom: 110px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #eee; }
        .card-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; text-align: center; color: var(--primary); }
        .input { width: 100%; padding: 15px; margin-bottom: 12px; border: none; background: #f1f3f5; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; margin-top: 10px; }
        .btn-accent { background: var(--accent); color: white; }
        .progress-wrapper { background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; margin-top: 10px; overflow: hidden; }
        .progress-fill { background: var(--success); height: 100%; transition: width 0.3s ease; }
        .status-box { padding: 15px; border-radius: 12px; text-align: center; margin: 10px 0; font-weight: bold; border: 1px solid transparent; }
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; display: flex; border-top: 1px solid #eee; padding-bottom: env(safe-area-inset-bottom); }
        .tab-item { flex: 1; display: flex; align-items: center; justify-content: center; border: none; background: none; color: #bdc3c7; font-weight: bold; font-size: 12px; }
        .tab-active { color: var(--primary); border-top: 3px solid var(--primary); }
        .history-item { background: white; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-left: 5px solid var(--success); }
        .history-item.expense { border-left-color: var(--danger); }
        small { color: #7f8c8d; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [tab, setTab] = useState('CALC');
            const [price, setPrice] = useState('');
            const [km, setKm] = useState('');
            const [extraLabel, setExtraLabel] = useState('');
            const [extraValue, setExtraValue] = useState('');
            const [history, setHistory] = useState([]);
            const [goal, setGoal] = useState('5000');
            const [days, setDays] = useState('20');
            const [kmLitro, setKmLitro] = useState('10'); 
            const [gasPrice, setGasPrice] = useState('5.80'); 

            useEffect(() => {
                const saved = localStorage.getItem('@entregador_v2_data');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    setHistory(parsed.history || []);
                    setGoal(parsed.goal || '5000');
                    setDays(parsed.days || '20');
                    setKmLitro(parsed.kmLitro || '10');
                    setGasPrice(parsed.gasPrice || '5.80');
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('@entregador_v2_data', JSON.stringify({ history, goal, days, kmLitro, gasPrice }));
            }, [history, goal, days, kmLitro, gasPrice]);

            const currentRate = (parseFloat(price) / parseFloat(km)) || 0;
            const fuelCostKm = parseFloat(gasPrice) / parseFloat(kmLitro);
            const currentFuelExpense = (parseFloat(km) * fuelCostKm) || 0;
            const rideNetProfit = (parseFloat(price) - currentFuelExpense) || 0;

            const totalNetAllTime = history.reduce((acc, curr) => acc + curr.net, 0);
            const remaining = parseFloat(goal) - totalNetAllTime;
            const daily = remaining > 0 ? (remaining / parseFloat(days)) : 0;

            const today = new Date().toLocaleDateString();
            const historyToday = history.filter(item => item.date === today);
            const earnedToday = historyToday.reduce((acc, curr) => acc + curr.net, 0);
            const progress = Math.min((earnedToday / daily) * 100, 100) || 0;

            const addRide = () => {
                const ride = { 
                    id: Date.now(), 
                    price: parseFloat(price), 
                    net: rideNetProfit,
                    km: parseFloat(km), 
                    rate: currentRate,
                    type: 'CORRIDA',
                    date: today,
                    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) 
                };
                setHistory([ride, ...history]);
                setPrice(''); setKm('');
            };

            const addExtra = (isGain) => {
                const val = parseFloat(extraValue) * (isGain ? 1 : -1);
                const extra = {
                    id: Date.now(),
                    price: val,
                    net: val,
                    label: extraLabel || (isGain ? 'Extra' : 'Gasto'),
                    type: 'EXTRA',
                    date: today,
                    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                };
                setHistory([extra, ...history]);
                setExtraLabel(''); setExtraValue('');
            };

            return (
                <div>
                    <div className="header">ENTREGADOR PRO v2</div>
                    <div className="content">
                        {tab === 'CALC' && (
                            <div>
                                <div className="card">
                                    <div className="card-title">Analisar Corrida</div>
                                    <input className="input" type="number" placeholder="Valor (R$)" value={price} onChange={e => setPrice(e.target.value)} />
                                    <input className="input" type="number" placeholder="Distância (KM)" value={km} onChange={e => setKm(e.target.value)} />
                                    {currentRate > 0 && (
                                        <div className="status-box" style={{
                                            background: currentRate >= 1.8 ? '#d4edda' : (currentRate >= 1.3 ? '#fff3cd' : '#f8d7da'),
                                            color: '#333',
                                            border: `1px solid ${currentRate >= 1.8 ? '#2ecc71' : (currentRate >= 1.3 ? '#f1c40f' : '#e74c3c')}`
                                        }}>
                                            {currentRate >= 1.8 ? '✅ CORRIDA BOA!' : (currentRate >= 1.3 ? '⚠️ CORRIDA MÉDIA' : '🚫 CORRIDA RUIM')}
                                            <br/><small>R$ {currentRate.toFixed(2)} / km</small>
                                            <hr style={{opacity: 0.1, margin: '10px 0'}} />
                                            <small>Lucro Líquido: <b>R$ {rideNetProfit.toFixed(2)}</b></small>
                                        </div>
                                    )}
                                    {parseFloat(price) > 0 && <button className="btn btn-success" onClick={addRide}>LANÇAR CORRIDA</button>}
                                </div>
                                <div className="card">
                                    <div className="card-title">Entradas / Saídas</div>
                                    <input className="input" placeholder="Ex: Almoço, Gorjeta..." value={extraLabel} onChange={e => setExtraLabel(e.target.value)} />
                                    <input className="input" type="number" placeholder="Valor (R$)" value={extraValue} onChange={e => setExtraValue(e.target.value)} />
                                    <div style={{display:'flex', gap:'10px'}}>
                                        <button className="btn btn-accent" style={{flex:1}} onClick={() => addExtra(true)}>+ RECEBI</button>
                                        <button className="btn btn-danger" style={{flex:1, marginTop:0}} onClick={() => addExtra(false)}>- GASTEI</button>
                                    </div>
                                </div>
                            </div>
                        )}
                        {tab === 'META' && (
                            <div>
                                <div className="card" style={{background: '#2c3e50', color: 'white', border: 'none'}}>
                                    <div style={{display:'flex', justifyContent:'space-around'}}>
                                        <div style={{textAlign:'center'}}>
                                            <small style={{color:'#bdc3c7'}}>HOJE (LÍQUIDO)</small><br/>
                                            <b style={{color: 'var(--success)', fontSize: '20px'}}>R$ {earnedToday.toFixed(2)}</b>
                                        </div>
                                        <div style={{textAlign:'center'}}>
                                            <small style={{color:'#bdc3c7'}}>FALTA GERAL</small><br/>
                                            <b style={{color: 'var(--danger)', fontSize: '20px'}}>R$ {remaining > 0 ? remaining.toFixed(2) : '0.00'}</b>
                                        </div>
                                    </div>
                                    <div style={{marginTop: '20px', textAlign: 'center', background: 'rgba(255,255,255,0.1)', padding: '15px', borderRadius: '15px'}}>
                                        <small style={{color:'#2ecc71'}}>META DIÁRIA ATUAL</small><br/>
                                        <span style={{fontSize: '28px', fontWeight: 'bold'}}>R$ {daily.toFixed(2)}</span>
                                        <div className="progress-wrapper"><div className="progress-fill" style={{width: `${progress}%`}}></div></div>
                                    </div>
                                </div>
                                <h3 style={{fontSize: '14px', color: '#7f8c8d', margin: '20px 0 10px'}}>HISTÓRICO DE HOJE</h3>
                                {historyToday.map(item => (
                                    <div key={item.id} className={`history-item ${item.net < 0 ? 'expense' : ''}`}>
                                        <div><small>{item.time}</small><br/><b>{item.type === 'CORRIDA' ? `${item.km} km (${item.rate.toFixed(2)}/km)` : item.label}</b></div>
                                        <b style={{color: item.net >= 0 ? 'var(--success)' : 'var(--danger)'}}>R$ {Math.abs(item.net).toFixed(2)}</b>
                                    </div>
                                ))}
                            </div>
                        )}
                        {tab === 'CONFIG' && (
                            <div>
                                <div className="card">
                                    <div className="card-title">Ajustes de Gasto</div>
                                    <label><small>KM por Litro (Média)</small></label>
                                    <input className="input" type="number" value={kmLitro} onChange={e => setKmLitro(e.target.value)} />
                                    <label><small>Preço do Litro</small></label>
                                    <input className="input" type="number" value={gasPrice} onChange={e => setGasPrice(e.target.value)} />
                                </div>
                                <div className="card">
                                    <div className="card-title">Metas Financeiras</div>
                                    <label><small>Meta Mensal LÍQUIDA (R$)</small></label>
                                    <input className="input" type="number" value={goal} onChange={e => setGoal(e.target.value)} />
                                    <label><small>Dias Restantes</small></label>
                                    <input className="input" type="number" value={days} onChange={e => setDays(e.target.value)} />
                                    <button className="btn btn-danger" onClick={() => confirm("Zerar tudo?") && setHistory([])}>REINICIAR TUDO</button>
                                </div>
                            </div>
                        )}
                    </div>
                    <nav className="tab-bar">
                        <button className={`tab-item ${tab === 'CALC' ? 'tab-active' : ''}`} onClick={() => setTab('CALC')}>LANÇAR</button>
                        <button className={`tab-item ${tab === 'META' ? 'tab-active' : ''}`} onClick={() => setTab('META')}>METAS</button>
                        <button className={`tab-item ${tab === 'CONFIG' ? 'tab-active' : ''}`} onClick={() => setTab('CONFIG')}>AJUSTES</button>
                    </nav>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
