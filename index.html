<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ENTREGADOR PRO v4</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root { --primary: #2c3e50; --success: #2ecc71; --danger: #e74c3c; --warning: #f1c40f; --bg: #f8f9fa; --accent: #3498db; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; margin: 0; background: var(--bg); color: #333; user-select: none; }
        .header { background: var(--primary); color: white; padding: 50px 20px 20px; text-align: center; font-weight: bold; letter-spacing: 2px; position: sticky; top: 0; z-index: 10; }
        .content { padding: 20px; padding-bottom: 110px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #eee; }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; text-align: center; color: var(--primary); text-transform: uppercase; }
        .input { width: 100%; padding: 15px; margin-bottom: 12px; border: none; background: #f1f3f5; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; margin-top: 10px; }
        .btn-accent { background: var(--accent); color: white; }
        
        /* Filtros */
        .filter-bar { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-filter { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; background: white; font-size: 12px; font-weight: bold; color: #7f8c8d; }
        .filter-active { background: var(--primary); color: white; border-color: var(--primary); }

        .progress-wrapper { background: rgba(255,255,255,0.1); height: 10px; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        .progress-fill { background: var(--success); height: 100%; transition: width 0.3s ease; }
        
        .status-box { padding: 15px; border-radius: 12px; text-align: center; margin: 10px 0; font-weight: bold; border: 1px solid transparent; }
        
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; display: flex; border-top: 1px solid #eee; padding-bottom: env(safe-area-inset-bottom); }
        .tab-item { flex: 1; display: flex; align-items: center; justify-content: center; border: none; background: none; color: #bdc3c7; font-weight: bold; font-size: 12px; }
        .tab-active { color: var(--primary); border-top: 3px solid var(--primary); }
        
        .history-item { background: white; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-left: 5px solid #ddd; position: relative; }
        .finish-divider { background: #e0e0e0; color: #7f8c8d; text-align: center; font-size: 10px; font-weight: bold; padding: 5px; border-radius: 8px; margin: 15px 0; text-transform: uppercase; letter-spacing: 1px; border: 1px dashed #ccc; }
        
        .badge { font-size: 9px; padding: 3px 7px; border-radius: 5px; color: white; margin-top: 4px; display: inline-block; font-weight: bold; }
        small { color: #7f8c8d; font-size: 11px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [tab, setTab] = useState('CALC');
            const [filter, setFilter] = useState('HOJE');
            const [price, setPrice] = useState('');
            const [km, setKm] = useState('');
            const [extraLabel, setExtraLabel] = useState('');
            const [extraValue, setExtraValue] = useState('');
            
            const [history, setHistory] = useState([]);
            const [totalGoal, setTotalGoal] = useState('10000');
            const [dailyGoal, setDailyGoal] = useState('300');
            const [kmLitro, setKmLitro] = useState('10'); 
            const [gasPrice, setGasPrice] = useState('5.80'); 

            useEffect(() => {
                const saved = localStorage.getItem('@entregador_v4_data');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    setHistory(parsed.history || []);
                    setTotalGoal(parsed.totalGoal || '10000');
                    setDailyGoal(parsed.dailyGoal || '300');
                    setKmLitro(parsed.kmLitro || '10');
                    setGasPrice(parsed.gasPrice || '5.80');
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('@entregador_v4_data', JSON.stringify({ history, totalGoal, dailyGoal, kmLitro, gasPrice }));
            }, [history, totalGoal, dailyGoal, kmLitro, gasPrice]);

            const currentRate = (parseFloat(price) / parseFloat(km)) || 0;
            const fuelCostKm = parseFloat(gasPrice) / parseFloat(kmLitro);
            const rideNetProfit = (parseFloat(price) - (parseFloat(km) * fuelCostKm)) || 0;

            const totalNetAllTime = history.reduce((acc, curr) => acc + (curr.net || 0), 0);
            
            // Lógica de Filtro
            const todayStr = new Date().toLocaleDateString();
            const thisMonth = new Date().getMonth();
            const thisYear = new Date().getFullYear();

            const filteredHistory = history.filter(item => {
                if (filter === 'HOJE') return item.date === todayStr;
                if (filter === 'MES') {
                    const [d, m, y] = item.date.split('/');
                    return (parseInt(m) - 1) === thisMonth && parseInt(y) === thisYear;
                }
                return true; // TUDO
            });

            const earnedInFilter = filteredHistory.reduce((acc, curr) => acc + (curr.net || 0), 0);
            const progressVal = filter === 'HOJE' ? (earnedInFilter / parseFloat(dailyGoal)) * 100 : (totalNetAllTime / parseFloat(totalGoal)) * 100;

            const getQuality = (rate) => {
                if (rate >= 1.8) return { label: 'BOA', color: '#2ecc71' };
                if (rate >= 1.3) return { label: 'MÉDIA', color: '#f1c40f' };
                return { label: 'RUIM', color: '#e74c3c' };
            };

            const addRide = () => {
                const ride = { 
                    id: Date.now(), price: parseFloat(price), net: rideNetProfit, km: parseFloat(km), 
                    rate: currentRate, type: 'CORRIDA', date: todayStr,
                    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) 
                };
                setHistory([ride, ...history]);
                setPrice(''); setKm('');
            };

            const addExtra = (isGain) => {
                const val = parseFloat(extraValue) * (isGain ? 1 : -1);
                const extra = {
                    id: Date.now(), price: val, net: val, label: extraLabel || (isGain ? 'Extra' : 'Gasto'),
                    type: 'EXTRA', date: todayStr, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                };
                setHistory([extra, ...history]);
                setExtraLabel(''); setExtraValue('');
            };

            const finishTurn = () => {
                if(confirm("Deseja finalizar o turno atual?")) {
                    const marker = {
                        id: Date.now(),
                        type: 'MARKER',
                        label: 'TURNO FINALIZADO',
                        date: todayStr,
                        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                        net: 0
                    };
                    setHistory([marker, ...history]);
                    setTab('META');
                }
            };

            return (
                <div>
                    <div className="header">ENTREGADOR PRO v4</div>
                    <div className="content">
                        {tab === 'CALC' && (
                            <div>
                                <div className="card">
                                    <div className="card-title">Analisar Corrida</div>
                                    <input className="input" type="number" placeholder="Valor (R$)" value={price} onChange={e => setPrice(e.target.value)} />
                                    <input className="input" type="number" placeholder="Distância (KM)" value={km} onChange={e => setKm(e.target.value)} />
                                    {currentRate > 0 && (
                                        <div className="status-box" style={{ background: '#fff', border: `2px solid ${getQuality(currentRate).color}` }}>
                                            <span style={{color: getQuality(currentRate).color}}>CORRIDA {getQuality(currentRate).label}</span>
                                            <br/><small>R$ {currentRate.toFixed(2)}/km | Lucro: R$ {rideNetProfit.toFixed(2)}</small>
                                        </div>
                                    )}
                                    {parseFloat(price) > 0 && <button className="btn btn-success" onClick={addRide}>LANÇAR CORRIDA</button>}
                                </div>
                                <div className="card">
                                    <div className="card-title">Extra / Gasto</div>
                                    <input className="input" placeholder="Descrição" value={extraLabel} onChange={e => setExtraLabel(e.target.value)} />
                                    <input className="input" type="number" placeholder="Valor (R$)" value={extraValue} onChange={e => setExtraValue(e.target.value)} />
                                    <div style={{display:'flex', gap:'10px'}}>
                                        <button className="btn btn-accent" style={{flex:1}} onClick={() => addExtra(true)}>+ RECEBI</button>
                                        <button className="btn btn-danger" style={{flex:1, marginTop:0}} onClick={() => addExtra(false)}>- GASTEI</button>
                                    </div>
                                </div>
                                <button className="btn" style={{background: '#34495e', color: 'white'}} onClick={finishTurn}>🏁 FINALIZAR TURNO</button>
                            </div>
                        )}

                        {tab === 'META' && (
                            <div>
                                <div className="filter-bar">
                                    <button className={`btn-filter ${filter === 'HOJE' ? 'filter-active' : ''}`} onClick={() => setFilter('HOJE')}>HOJE</button>
                                    <button className={`btn-filter ${filter === 'MES' ? 'filter-active' : ''}`} onClick={() => setFilter('MES')}>MÊS</button>
                                    <button className={`btn-filter ${filter === 'TUDO' ? 'filter-active' : ''}`} onClick={() => setFilter('TUDO')}>TOTAL</button>
                                </div>

                                <div className="card" style={{background: '#2c3e50', color: 'white', border: 'none'}}>
                                    <div style={{textAlign:'center'}}>
                                        <small style={{color:'#bdc3c7'}}>{filter === 'TUDO' ? 'LUCRO TOTAL ACUMULADO' : `LUCRO ${filter}`}</small><br/>
                                        <b style={{color: 'var(--success)', fontSize: '28px'}}>R$ {earnedInFilter.toFixed(2)}</b>
                                        <div className="progress-wrapper">
                                            <div className="progress-fill" style={{width: `${Math.min(progressVal, 100)}%`}}></div>
                                        </div>
                                        <small style={{display:'block', marginTop: '10px'}}>
                                            {filter === 'HOJE' ? `Meta do Dia: R$ ${dailyGoal}` : `Meta do Plano: R$ ${totalGoal}`}
                                        </small>
                                    </div>
                                </div>

                                <h3 style={{fontSize: '12px', color: '#7f8c8d', margin: '20px 0 10px'}}>RESUMO DO PERÍODO</h3>
                                {filteredHistory.length === 0 && <p style={{textAlign:'center', color:'#bdc3c7'}}>Nenhum registro neste filtro.</p>}
                                
                                {filteredHistory.map(item => (
                                    item.type === 'MARKER' ? (
                                        <div key={item.id} className="finish-divider">
                                            🏁 {item.label} - {item.time} ({item.date})
                                        </div>
                                    ) : (
                                        <div key={item.id} className="history-item" style={{borderLeftColor: item.type === 'EXTRA' ? (item.net > 0 ? '#2ecc71' : '#e74c3c') : getQuality(item.rate).color}}>
                                            <div>
                                                <small>{item.date} às {item.time}</small><br/>
                                                <b>{item.type === 'CORRIDA' ? `${item.km} km` : item.label}</b><br/>
                                                {item.type === 'CORRIDA' && <span className="badge" style={{background: getQuality(item.rate).color}}>{getQuality(item.rate).label}</span>}
                                            </div>
                                            <b style={{color: item.net >= 0 ? 'var(--success)' : 'var(--danger)'}}>{item.net >= 0 ? '+' : ''} R$ {Math.abs(item.net).toFixed(2)}</b>
                                        </div>
                                    )
                                ))}
                            </div>
                        )}

                        {tab === 'CONFIG' && (
                            <div>
                                <div className="card">
                                    <div className="card-title">Metas do Gerente</div>
                                    <label><small>Meta do Plano Total (R$)</small></label>
                                    <input className="input" type="number" value={totalGoal} onChange={e => setTotalGoal(e.target.value)} />
                                    <label><small>Meta por Turno/Dia (R$)</small></label>
                                    <input className="input" type="number" value={dailyGoal} onChange={e => setDailyGoal(e.target.value)} />
                                </div>
                                <div className="card">
                                    <div className="card-title">Consumo do Veículo</div>
                                    <div style={{display:'flex', gap:'10px'}}>
                                        <div style={{flex:1}}><label><small>Média KM/L</small></label><input className="input" type="number" value={kmLitro} onChange={e => setKmLitro(e.target.value)} /></div>
                                        <div style={{flex:1}}><label><small>Preço Litro</small></label><input className="input" type="number" value={gasPrice} onChange={e => setGasPrice(e.target.value)} /></div>
                                    </div>
                                </div>
                                <button className="btn btn-danger" onClick={() => confirm("Apagar todos os dados?") && setHistory([])}>LIMPAR TUDO</button>
                            </div>
                        )}
                    </div>
                    <nav className="tab-bar">
                        <button className={`tab-item ${tab === 'CALC' ? 'tab-active' : ''}`} onClick={() => setTab('CALC')}>LANÇAR</button>
                        <button className={`tab-item ${tab === 'META' ? 'tab-active' : ''}`} onClick={() => setTab('META')}>METAS</button>
                        <button className={`tab-item ${tab === 'CONFIG' ? 'tab-active' : ''}`} onClick={() => setTab('CONFIG')}>AJUSTES</button>
                    </nav>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
