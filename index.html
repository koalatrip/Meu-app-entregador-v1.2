<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>ENTREGADOR PRO V4 - GESTÃO ATIVA</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root { --primary: #1a1a1a; --success: #00c853; --danger: #ff3d00; --bg: #f0f2f5; }
        body { font-family: -apple-system, system-ui; margin: 0; background: var(--bg); padding-bottom: 90px; }
        .header { background: var(--primary); color: white; padding: 40px 20px 20px; text-align: center; font-weight: 800; border-radius: 0 0 25px 25px; }
        .container { padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .card-title { font-size: 14px; color: #666; text-transform: uppercase; margin-bottom: 15px; font-weight: 700; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; margin-bottom: 5px; color: #888; padding-left: 5px; }
        .input { width: 100%; padding: 14px; border: 2px solid #f0f0f0; border-radius: 12px; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        .input:focus { border-color: var(--primary); outline: none; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-save { background: var(--success); color: white; margin-top: 10px; }
        .sim-result { background: #f8f9fa; border-radius: 15px; padding: 15px; margin: 15px 0; border: 2px dashed #ddd; text-align: center; }
        .stat-value { font-size: 24px; font-weight: 900; display: block; }
        .tab-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; height: 75px; z-index: 100; }
        .tab-btn { flex: 1; border: none; background: none; font-size: 11px; font-weight: 700; color: #aaa; }
        .tab-active { color: var(--primary); border-top: 3px solid var(--primary); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('SIMULAR');
            const [bruto, setBruto] = useState('');
            const [km, setKm] = useState('');
            const [taxa, setTaxa] = useState(20);
            const [gas, setGas] = useState(5.80);
            const [consumo, setConsumo] = useState(10);
            const [historico, setHistorico] = useState([]);

            useEffect(() => {
                const data = localStorage.getItem('PRO_DELIVERY_DATA');
                if (data) setHistorico(JSON.parse(data));
            }, []);

            useEffect(() => {
                localStorage.setItem('PRO_DELIVERY_DATA', JSON.stringify(historico));
            }, [historico]);

            // Cálculos
            const valorLiquidoApp = bruto * (1 - taxa/100);
            const custoGas = (km / consumo) * gas;
            const lucroReal = valorLiquidoApp - custoGas;
            const valorKm = km > 0 ? (lucroReal / km).toFixed(2) : 0;

            const salvar = () => {
                if (!bruto || !km) return alert("Preencha os valores");
                const nova = { id: Date.now(), bruto, km, lucroReal, valorKm, data: new Date().toLocaleDateString() };
                setHistorico([nova, ...historico]);
                setBruto(''); setKm('');
                alert("Corrida registrada com sucesso!");
            };

            const totalLucro = historico.reduce((acc, c) => acc + c.lucroReal, 0);

            return (
                <div>
                    <div className="header">ENTREGADOR PRO V4</div>
                    
                    <div className="container">
                        {view === 'SIMULAR' && (
                            <div className="card">
                                <div className="card-title">Simular Ganho Real</div>
                                <div className="input-group">
                                    <label>Valor Bruto no App (R$)</label>
                                    <input className="input" type="number" value={bruto} onChange={e => setBruto(e.target.value)} placeholder="0,00" />
                                </div>
                                <div className="input-group">
                                    <label>KM Total da Corrida</label>
                                    <input className="input" type="number" value={km} onChange={e => setKm(e.target.value)} placeholder="0" />
                                </div>

                                {bruto > 0 && km > 0 && (
                                    <div className="sim-result">
                                        <small style={{color: '#888'}}>LUCRO LIVRE ESTIMADO</small>
                                        <span className="stat-value" style={{color: lucroReal > 0 ? 'var(--success)' : 'var(--danger)'}}>
                                            R$ {lucroReal.toFixed(2)}
                                        </span>
                                        <small>R$ {valorKm} por KM</small>
                                    </div>
                                )}
                                
                                <button className="btn btn-save" onClick={salvar}>SALVAR NO HISTÓRICO</button>
                            </div>
                        )}

                        {view === 'RESUMO' && (
                            <div>
                                <div className="card" style={{background: 'var(--primary)', color: 'white'}}>
                                    <div className="card-title" style={{color: '#aaa'}}>Acumulado do Mês</div>
                                    <span className="stat-value" style={{color: 'var(--success)'}}>R$ {totalLucro.toFixed(2)}</span>
                                </div>
                                {historico.map(item => (
                                    <div key={item.id} className="card" style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '15px'}}>
                                        <div>
                                            <small>{item.data}</small><br/>
                                            <b>{item.km} KM rodados</b>
                                        </div>
                                        <div style={{textAlign: 'right'}}>
                                            <b style={{color: 'var(--success)'}}>+ R$ {item.lucroReal.toFixed(2)}</b><br/>
                                            <small>R$ {item.valorKm}/km</small>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'CONFIG' && (
                            <div className="card">
                                <div className="card-title">Ajustes de Custos</div>
                                <div className="input-group">
                                    <label>Taxa Lalamove (%)</label>
                                    <input className="input" type="number" value={taxa} onChange={e => setTaxa(e.target.value)} />
                                </div>
                                <div className="input-group">
                                    <label>Preço Gasolina (R$)</label>
                                    <input className="input" type="number" value={gas} onChange={e => setGas(e.target.value)} />
                                </div>
                                <div className="input-group">
                                    <label>Consumo do Veículo (KM/L)</label>
                                    <input className="input" type="number" value={consumo} onChange={e => setConsumo(e.target.value)} />
                                </div>
                                <button className="btn btn-primary" onClick={() => confirm('Limpar tudo?') && setHistorico([])}>LIMPAR BANCO DE DADOS</button>
                            </div>
                        )}
                    </div>

                    <nav className="tab-nav">
                        <button className={`tab-btn ${view === 'SIMULAR' ? 'tab-active' : ''}`} onClick={() => setView('SIMULAR')}>SIMULAR</button>
                        <button className={`tab-btn ${view === 'RESUMO' ? 'tab-active' : ''}`} onClick={() => setView('RESUMO')}>HISTÓRICO</button>
                        <button className={`tab-btn ${view === 'CONFIG' ? 'tab-active' : ''}`} onClick={() => setView('CONFIG')}>AJUSTES</button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
